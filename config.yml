baseURL: "https://yunfei07.github.io/"
title: Fei
theme: PaperMod
paginate: 20

enableInlineShortcodes: true
enableRobotsTXT: true

taxonomies:
    tag: tags

menu:
    main:
        - name: Blog
          url: /blog/
          weight: 1
        - name: Books
          url: /books/
          weight: 2
        - name: Tags
          url: /tags/
          weight: 3
        - name: Archive
          url: /archive/
          weight: 4

params:
    description: "This website hosts Fei's research papers, blog, books, design templates, curriculum vitae, and contact information."
    author: Fei
    googleAnalyticsID: "G-97G4MZ40613"
    images: ["cover.png"]
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: true
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["blog","books"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Fei
          subtitle: "More wonder, more insight, more expression, more joy!"
          imageUrl: "/picture.jpg"
          imageWidth: 160
          imageHeight: 160
          buttons:
            - name: Blog
              url: /blog/
            - name: Books
              url: /books/
            - name: Tags
              url: /tags/
            - name: Archive
              url: /archive/

    socialIcons:
        - name: Email
          url: mailto:yangyunfei07@gmail.com
        - name: GitHub
          url: https://github.com/yunfei07

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: true
        hiddenInSingle: true
    label:
      text: "Fei"
      icon: /favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: xcode
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2

titleCaseStyle: 'none'
